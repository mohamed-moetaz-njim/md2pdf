name: md2pdf
description: Convert Markdown to PDF with md2pdf — single binary, no LaTeX or browser.
branding:
  icon: file-text
  color: blue

inputs:
  input:
    description: Markdown file to convert.
    required: true
  output:
    description: Output path. Defaults to the input with a .pdf extension.
    required: false
    default: ""
  theme:
    description: Theme (default | book | path to a custom .toml theme).
    required: false
    default: default
  paper:
    description: Paper size (a4 | a5 | letter | legal).
    required: false
    default: a4
  toc:
    description: Add a table of contents (true | false).
    required: false
    default: "false"
  format:
    description: Output format (pdf | typst | html). Defaults to pdf.
    required: false
    default: ""
  header:
    description: Running page header ({title}, {author}, {date} placeholders).
    required: false
    default: ""
  footer:
    description: Running page footer ({title}, {author}, {date} placeholders).
    required: false
    default: ""
  args:
    description: Extra raw arguments passed to md2pdf.
    required: false
    default: ""
  version:
    description: Release tag to install, or "latest".
    required: false
    default: latest

outputs:
  output:
    description: Path of the generated file.
    value: ${{ steps.convert.outputs.output }}

runs:
  using: composite
  steps:
    - name: Install md2pdf
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
      run: |
        set -euo pipefail
        repo="mohamed-moetaz-njim/md2pdf"
        ver="${{ inputs.version }}"
        if [ "$ver" = "latest" ]; then
          tag="$(gh release view --repo "$repo" --json tagName --jq .tagName)"
        else
          tag="$ver"
        fi
        echo "Installing md2pdf $tag"
        gh release download "$tag" --repo "$repo" --pattern '*_amd64.deb' --output /tmp/md2pdf.deb
        sudo apt-get install -y /tmp/md2pdf.deb

    - name: Convert
      id: convert
      shell: bash
      run: |
        set -euo pipefail
        input='${{ inputs.input }}'
        output='${{ inputs.output }}'
        format='${{ inputs.format }}'
        if [ -z "$output" ]; then
          case "$format" in
            typst) ext="typ" ;;
            html) ext="html" ;;
            *) ext="pdf" ;;
          esac
          output="${input%.*}.$ext"
        fi
        extra=()
        if [ '${{ inputs.toc }}' = 'true' ]; then extra+=(--toc); fi
        if [ -n "$format" ]; then extra+=(--format "$format"); fi
        if [ -n '${{ inputs.header }}' ]; then extra+=(--header '${{ inputs.header }}'); fi
        if [ -n '${{ inputs.footer }}' ]; then extra+=(--footer '${{ inputs.footer }}'); fi
        md2pdf "$input" -o "$output" \
          --theme '${{ inputs.theme }}' \
          --paper '${{ inputs.paper }}' \
          "${extra[@]}" ${{ inputs.args }}
        echo "output=$output" >> "$GITHUB_OUTPUT"
        echo "Wrote $output"
