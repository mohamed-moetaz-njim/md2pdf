name: Bug report
description: Something rendered wrong or md2pdf crashed
labels: [bug]
body:
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Minimal Markdown to reproduce
      description: The smallest input that triggers it.
      render: markdown
    validations:
      required: true

  - type: input
    id: command
    attributes:
      label: Command
      placeholder: md2pdf doc.md --theme book --toc
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected vs actual
      description: What you expected, and what you got (attach the PDF or a screenshot if helpful).
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Paste the output of `md2pdf doctor`.
      render: text
    validations:
      required: true
