name: Feature request
description: Suggest a feature or a new renderer/theme
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What documentation workflow is hard or impossible today?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: >
        What you'd like md2pdf to do. If it's a Markdown feature, include
        example input and the desired output.
    validations:
      required: true

  - type: input
    id: area
    attributes:
      label: Where it fits
      description: >
        If you know the area (parser / IR / a renderer / theme / CLI), mention
        it — see docs/ARCHITECTURE.md and docs/ROADMAP.md.
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
