name: audit

on:
  schedule:
    - cron: "0 6 * * 1" # Mondays 06:00 UTC
  push:
    paths:
      - "**/Cargo.toml"
      - "**/Cargo.lock"
      - ".github/workflows/audit.yml"

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write # the action files issues for new advisories
    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/audit@v1
