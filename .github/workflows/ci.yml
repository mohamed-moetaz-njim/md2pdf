name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Test
        run: cargo test --workspace --locked

      - name: Smoke test the CLI
        if: runner.os != 'Windows'
        run: |
          cargo run --locked -p md2pdf -- examples/sample.md -o /tmp/sample.pdf
          file /tmp/sample.pdf | grep -q 'PDF document'
          cargo run --locked -p md2pdf -- doctor
          cargo run --locked -p md2pdf -- validate --strict examples/sample.md

      - name: Reproducibility gate
        if: runner.os != 'Windows'
        run: |
          cargo run --locked -p md2pdf -- examples/sample.md -o /tmp/a.pdf
          cargo run --locked -p md2pdf -- examples/sample.md -o /tmp/b.pdf
          cmp /tmp/a.pdf /tmp/b.pdf
          echo "reproducible: $(sha256sum /tmp/a.pdf | cut -d' ' -f1)"

  msrv:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.89"
      - uses: Swatinem/rust-cache@v2

      - name: Check with the minimum supported Rust version
        run: cargo check --workspace --locked
