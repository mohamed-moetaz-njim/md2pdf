name: ci

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        run: cargo clippy --all-targets --all-features --locked -- -D warnings

      - name: Test
        run: cargo test --workspace --locked

      - name: Smoke test the CLI
        run: |
          cargo run --locked -p md2pdf -- examples/sample.md -o /tmp/sample.pdf
          file /tmp/sample.pdf | grep -q 'PDF document'
          cargo run --locked -p md2pdf -- doctor
          cargo run --locked -p md2pdf -- validate examples/sample.md
