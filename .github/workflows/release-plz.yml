# Release automation: release-plz opens a "Release PR" that bumps versions and
# updates CHANGELOG.md from conventional commits. Merging that PR tags the release,
# which triggers release.yml (.deb/.rpm) and publishes to crates.io.
#
# This workflow is INERT until a crates.io token is configured. Without the
# CARGO_REGISTRY_TOKEN secret the release-plz step is skipped, so a fresh fork or a
# repo that hasn't opted into crates.io publishing never sees a failing release run.
#
# To enable: add the repository secret CARGO_REGISTRY_TOKEN (a crates.io API token).
name: release-plz

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'mohamed-moetaz-njim' }}
    steps:
      - name: Check for crates.io token
        id: gate
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
        run: |
          if [ -n "$CARGO_REGISTRY_TOKEN" ]; then
            echo "enabled=true" >> "$GITHUB_OUTPUT"
          else
            echo "enabled=false" >> "$GITHUB_OUTPUT"
            echo "::notice::CARGO_REGISTRY_TOKEN not set — skipping release-plz."
          fi

      - uses: actions/checkout@v6
        if: steps.gate.outputs.enabled == 'true'
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        if: steps.gate.outputs.enabled == 'true'
      - name: Run release-plz
        if: steps.gate.outputs.enabled == 'true'
        uses: release-plz/action@v0.5.129
        with:
          command: release-plz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
