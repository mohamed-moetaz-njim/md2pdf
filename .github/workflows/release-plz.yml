# Release automation: release-plz opens a "Release PR" that bumps versions and
# updates CHANGELOG.md from conventional commits. Merging that PR tags the release,
# which triggers release.yml (.deb/.rpm) and publishes to crates.io.
#
# Requires two repository secrets:
#   CARGO_REGISTRY_TOKEN  — crates.io API token
#   (GITHUB_TOKEN is provided automatically)
name: release-plz

on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-plz:
    runs-on: ubuntu-latest
    if: ${{ github.repository_owner == 'mohamed-moetaz-njim' }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
      - name: Run release-plz
        uses: release-plz/action@v0
        with:
          command: release-plz
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ secrets.CARGO_REGISTRY_TOKEN }}
