name: release

on:
  push:
    tags: ["v*"]

env:
  CARGO_TERM_COLOR: always

jobs:
  package:
    name: build & package
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked -p md2pdf

      - name: Smoke test
        run: ./target/release/md2pdf examples/sample.md -o /tmp/sample.pdf && file /tmp/sample.pdf

      - name: Install packaging tools
        run: cargo install cargo-deb cargo-generate-rpm

      - name: Build .deb and .rpm
        run: |
          cargo deb --no-build -p md2pdf
          cargo generate-rpm -p crates/cli

      - name: Upload packages to the release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            target/debian/*.deb
            target/generate-rpm/*.rpm
          generate_release_notes: true
